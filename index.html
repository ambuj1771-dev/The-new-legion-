<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="google-site-verification" content="SYOHukSdD5r3CueZdTk2H9RJ5GdxMaoPBTS6CCC0150" />
<title>The One Journal — Daily News, World &amp; Tech</title>
<meta name="description" content="The One Journal delivers daily news and analysis across World affairs, Technology, and more — clear, timely, trustworthy reporting.">

<!-- Preconnect for faster font loading -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:opsz,wght@8..60,400;8..60,700;8..60,900&family=Inter:wght@400;600;700&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet" media="print" onload="this.media='all'">
<noscript>
  <link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:opsz,wght@8..60,400;8..60,700;8..60,900&family=Inter:wght@400;600;700&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
</noscript>

<style>
  :root {
    --ink: #0A192F; /* Dark Navy */
    --ink-soft: #1E3A5F;
    --cream: #F8F6F0;
    --cream-deep: #EDE8DB;
    --paper: #FFFFFF;
    --red: #B22234; /* Crimson */
    --red-deep: #8B1A1A;
    --gold: #C9A04E; /* Premium Gold */
    --gold-light: #E8D5A3;
    --rule: #D1C9B8;
    --rule-strong: #A89F8C;
    --slate: #4A5568;
    --ok: #1E6B4F;
    --focus: #1758C9;
    --serif: 'Playfair Display', 'Source Serif 4', Georgia, serif;
    --sans: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    --mono: 'JetBrains Mono', ui-monospace, Menlo, monospace;
    --shadow: 0 20px 60px rgba(10, 25, 47, 0.08);
    --shadow-hover: 0 30px 80px rgba(10, 25, 47, 0.15);
    --radius: 16px;
    --transition: all 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94);
  }

  * {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
  }

  body {
    background: var(--cream);
    color: var(--ink);
    font-family: var(--sans);
    -webkit-font-smoothing: antialiased;
    line-height: 1.6;
  }

  img {
    max-width: 100%;
    display: block;
    border-radius: 8px;
  }

  a {
    color: inherit;
    text-decoration: none;
  }

  html {
    scroll-behavior: smooth;
  }

  ::selection {
    background: var(--gold);
    color: var(--ink);
  }

  .skip-link {
    position: absolute;
    left: -999px;
    top: 0;
    background: var(--ink);
    color: var(--cream);
    padding: 12px 20px;
    z-index: 999;
    border-radius: 0 0 8px 0;
    font-weight: 600;
  }

  .skip-link:focus {
    left: 20px;
    top: 20px;
  }

  .masthead-wrap {
    background: var(--paper);
    border-bottom: 3px solid var(--gold);
    box-shadow: 0 4px 20px rgba(0, 0, 0, 0.03);
    position: sticky;
    top: 0;
    z-index: 100;
    backdrop-filter: blur(12px);
    background: rgba(255, 255, 255, 0.92);
  }

  .masthead-top {
    max-width: 1240px;
    margin: 0 auto;
    padding: 12px 24px 0;
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 0.06em;
    color: var(--slate);
    text-transform: uppercase;
  }

  .lock-btn {
    background: rgba(10, 25, 47, 0.04);
    border: 1px solid var(--rule);
    border-radius: 40px;
    padding: 6px 14px 6px 10px;
    color: var(--slate);
    font-family: var(--mono);
    font-size: 10px;
    display: flex;
    align-items: center;
    gap: 6px;
    transition: var(--transition);
    backdrop-filter: blur(4px);
  }

  .lock-btn:hover {
    border-color: var(--gold);
    color: var(--ink);
    background: rgba(201, 160, 78, 0.08);
    transform: translateY(-1px);
  }

  .lock-btn svg {
    width: 14px;
    height: 14px;
  }

  .masthead {
    max-width: 1240px;
    margin: 0 auto;
    padding: 8px 24px 24px;
    text-align: center;
  }

  .masthead h1 {
    font-family: var(--serif);
    font-weight: 700;
    letter-spacing: -0.02em;
    font-size: clamp(44px, 8vw, 80px);
    margin: 0;
    line-height: 0.95;
    background: linear-gradient(135deg, var(--ink) 40%, var(--gold) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .masthead h1 .the {
    font-size: 0.28em;
    display: block;
    font-weight: 500;
    letter-spacing: 0.4em;
    text-transform: uppercase;
    margin-bottom: 4px;
    color: var(--gold);
    -webkit-text-fill-color: var(--gold);
    background: none;
  }

  .masthead .tagline {
    font-family: var(--mono);
    font-size: 12px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--slate);
    margin-top: 10px;
    border-top: 1px solid var(--rule);
    padding-top: 10px;
    display: inline-block;
  }

  .support-bar {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
    width: 100%;
    background: linear-gradient(135deg, #FBF3DE 0%, #F5E8C8 50%, #EDDDB5 100%);
    border-top: 1px solid var(--gold-light);
    border-bottom: 1px solid var(--gold-light);
    color: #6B4F1A;
    font-family: var(--mono);
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    padding: 12px 20px;
    cursor: pointer;
    transition: var(--transition);
  }

  .support-bar:hover {
    background: linear-gradient(135deg, #F5E8C8 0%, #EDDDB5 50%, #E5CE9E 100%);
    transform: scale(1.01);
  }

  .support-bar svg {
    width: 18px;
    height: 18px;
    fill: none;
    stroke: #6B4F1A;
    stroke-width: 2;
  }

  nav.main-nav {
    background: var(--ink);
    border-top: 2px solid var(--gold);
  }

  .nav-inner {
    max-width: 1240px;
    margin: 0 auto;
    padding: 0 24px;
    display: flex;
    gap: 4px;
    overflow-x: auto;
    scrollbar-width: none;
  }

  .nav-inner::-webkit-scrollbar {
    display: none;
  }

  .nav-inner a {
    font-family: var(--mono);
    font-size: 12px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: rgba(255, 255, 255, 0.7);
    padding: 14px 18px;
    display: inline-block;
    border-bottom: 3px solid transparent;
    white-space: nowrap;
    transition: var(--transition);
    font-weight: 500;
  }

  .nav-inner a:hover {
    color: #fff;
    background: rgba(255, 255, 255, 0.04);
  }

  .nav-inner a.active {
    color: #fff;
    border-bottom-color: var(--gold);
  }

  .ticker-wrap {
    background: linear-gradient(90deg, var(--red), var(--red-deep));
    color: #fff;
    display: flex;
    align-items: center;
    overflow: hidden;
    border-bottom: 2px solid var(--gold);
  }

  .ticker-label {
    background: rgba(0, 0, 0, 0.2);
    font-family: var(--mono);
    font-weight: 700;
    font-size: 10px;
    letter-spacing: 0.12em;
    padding: 10px 18px;
    white-space: nowrap;
    flex-shrink: 0;
    backdrop-filter: blur(4px);
  }

  .ticker-track-outer {
    overflow: hidden;
    flex: 1;
    position: relative;
  }

  .ticker-track {
    display: flex;
    white-space: nowrap;
    animation: ticker 40s linear infinite;
    padding: 10px 0;
    will-change: transform;
  }

  .ticker-track:hover {
    animation-play-state: paused;
  }

  .ticker-track span {
    font-size: 13px;
    font-weight: 500;
    padding: 0 32px;
    border-right: 1px solid rgba(255, 255, 255, 0.25);
  }

  @keyframes ticker {
    from {
      transform: translateX(0);
    }
    to {
      transform: translateX(-50%);
    }
  }

  @media (prefers-reduced-motion: reduce) {
    .ticker-track {
      animation: none;
      overflow-x: auto;
    }
  }

  main {
    max-width: 1240px;
    margin: 0 auto;
    padding: 40px 24px 80px;
  }

  .story-row {
    display: grid;
    grid-template-columns: 1fr 160px;
    gap: 24px;
    padding: 28px 0;
    border-bottom: 1px solid var(--rule);
    transition: var(--transition);
    background: transparent;
    border-radius: var(--radius);
    padding: 24px;
    margin-bottom: 8px;
  }

  .story-row:hover {
    background: var(--paper);
    box-shadow: var(--shadow);
    transform: translateX(6px);
    border-radius: var(--radius);
  }

  .story-row .thumb {
    width: 160px;
    height: 110px;
    object-fit: cover;
    background: var(--cream-deep);
    border: 1px solid var(--rule);
    border-radius: 8px;
    transition: var(--transition);
  }

  .story-row:hover .thumb {
    transform: scale(1.02);
    box-shadow: 0 8px 24px rgba(0, 0, 0, 0.08);
  }

  .story-row h3 {
    font-family: var(--serif);
    font-size: 22px;
    line-height: 1.2;
    margin: 0 0 8px;
    font-weight: 700;
    transition: var(--transition);
  }

  .story-row h3 a:hover {
    color: var(--red);
  }

  .story-row .deck {
    font-size: 15px;
    margin-bottom: 8px;
    color: var(--slate);
    font-weight: 400;
  }

  .story-row.no-img {
    grid-template-columns: 1fr;
  }

  .lead-story {
    display: grid;
    grid-template-columns: 1.2fr 0.8fr;
    gap: 40px;
    border-bottom: 3px solid var(--gold);
    padding-bottom: 40px;
    margin-bottom: 40px;
    background: var(--paper);
    border-radius: var(--radius);
    padding: 32px;
    box-shadow: var(--shadow);
    transition: var(--transition);
  }

  .lead-story:hover {
    box-shadow: var(--shadow-hover);
  }

  .lead-story .lead-img {
    width: 100%;
    aspect-ratio: 16/10;
    object-fit: cover;
    background: var(--cream-deep);
    border-radius: 12px;
    border: 1px solid var(--rule);
    transition: var(--transition);
  }

  .lead-story:hover .lead-img {
    transform: scale(1.01);
  }

  .lead-story h2 {
    font-family: var(--serif);
    font-size: clamp(30px, 4.5vw, 48px);
    line-height: 1.05;
    margin: 0 0 14px;
    font-weight: 700;
  }

  .lead-story h2 a:hover {
    color: var(--red);
    text-decoration: underline;
    text-underline-offset: 6px;
    text-decoration-color: var(--gold);
  }

  .support-modal {
    max-width: 440px;
    text-align: center;
    position: relative;
    padding-top: 40px;
    background: linear-gradient(145deg, var(--paper), var(--cream));
    border: 1px solid var(--gold-light);
    box-shadow: var(--shadow-hover);
    border-radius: 20px;
  }

  .support-modal h2 {
    font-family: var(--serif);
    font-size: 24px;
    background: linear-gradient(135deg, var(--gold), #8B6F2C);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .support-qr {
    width: 190px;
    height: 190px;
    border: 4px solid var(--gold-light);
    border-radius: 12px;
    box-shadow: 0 0 0 1px var(--gold), 0 12px 40px rgba(201, 160, 78, 0.2);
    transition: var(--transition);
  }

  .support-qr:hover {
    transform: scale(1.04) rotate(1deg);
  }

  .support-upi-row {
    background: linear-gradient(135deg, var(--cream-deep), #F5EDDF);
    border: 1px solid var(--gold-light);
    border-radius: 40px;
    padding: 12px 18px;
  }

  .support-upi-id {
    font-family: var(--mono);
    font-size: 14px;
    font-weight: 700;
    color: var(--ink);
    background: var(--paper);
    padding: 4px 12px;
    border-radius: 30px;
    box-shadow: inset 0 1px 4px rgba(0, 0, 0, 0.04);
  }

  .support-copy-btn {
    background: var(--gold);
    color: var(--ink);
    border: none;
    border-radius: 30px;
    padding: 6px 16px;
    font-weight: 700;
    transition: var(--transition);
  }

  .support-copy-btn:hover {
    background: var(--ink);
    color: var(--gold);
    transform: scale(1.04);
  }

  .rail {
    border-left: none;
    padding-left: 0;
    background: rgba(255, 255, 255, 0.3);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    border-radius: var(--radius);
    padding: 24px;
    border: 1px solid rgba(255, 255, 255, 0.4);
    box-shadow: var(--shadow);
  }

  .rail h4 {
    font-family: var(--serif);
    font-size: 18px;
    letter-spacing: 0.04em;
    color: var(--gold);
    border-bottom: 2px solid var(--gold);
    padding-bottom: 10px;
    margin: 0 0 18px;
    font-weight: 700;
  }

  .rail-item {
    padding: 14px 0;
    border-bottom: 1px solid var(--rule);
    transition: var(--transition);
  }

  .rail-item:hover {
    transform: translateX(6px);
  }

  .rail-item a {
    font-family: var(--serif);
    font-size: 16px;
    font-weight: 600;
    line-height: 1.3;
  }

  .rail-item a:hover {
    color: var(--red);
  }

  .btn {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: linear-gradient(135deg, var(--ink), var(--ink-soft));
    color: #fff;
    border: none;
    padding: 12px 28px;
    font-family: var(--mono);
    font-size: 12px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    border-radius: 40px;
    transition: var(--transition);
    font-weight: 600;
    box-shadow: 0 4px 16px rgba(10, 25, 47, 0.1);
  }

  .btn:hover {
    transform: translateY(-3px);
    box-shadow: 0 8px 32px rgba(10, 25, 47, 0.18);
  }

  .btn.red {
    background: linear-gradient(135deg, var(--red), var(--red-deep));
  }

  .btn.red:hover {
    background: linear-gradient(135deg, var(--red-deep), #6B1515);
  }

  .btn.ghost {
    background: transparent;
    color: var(--ink);
    border: 1.5px solid var(--gold);
    box-shadow: none;
  }

  .btn.ghost:hover {
    background: var(--gold);
    color: var(--ink);
    border-color: var(--gold);
  }

  footer {
    background: linear-gradient(135deg, var(--ink), #0D1B2A);
    color: #C9D1E0;
    margin-top: 60px;
    border-top: 3px solid var(--gold);
  }

  .footer-inner {
    max-width: 1240px;
    margin: 0 auto;
    padding: 48px 24px 32px;
    display: grid;
    grid-template-columns: 1.4fr 1fr 1fr;
    gap: 40px;
  }

  .footer-brand {
    font-family: var(--serif);
    font-size: 26px;
    font-weight: 700;
    color: #fff;
    margin-bottom: 8px;
    background: linear-gradient(135deg, #fff, var(--gold-light));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .footer-links a {
    color: rgba(255, 255, 255, 0.7);
    transition: var(--transition);
  }

  .footer-links a:hover {
    color: var(--gold);
    transform: translateX(4px);
  }

  .footer-bottom {
    border-top: 1px solid rgba(255, 255, 255, 0.06);
    padding: 20px 24px;
    text-align: center;
    color: rgba(255, 255, 255, 0.3);
  }

  @media (max-width: 860px) {
    .lead-story {
      grid-template-columns: 1fr;
      padding: 20px;
    }
    .section-rail {
      grid-template-columns: 1fr;
    }
    .rail {
      border-left: none;
      border-top: 2px solid var(--gold);
      padding-top: 24px;
      margin-top: 20px;
    }
    .footer-inner {
      grid-template-columns: 1fr;
      gap: 28px;
    }
    .story-row {
      grid-template-columns: 1fr;
      padding: 16px;
    }
    .story-row .thumb {
      width: 100%;
      height: 180px;
      order: -1;
    }
    .masthead-top {
      flex-wrap: wrap;
      gap: 8px;
    }
    .support-modal {
      margin: 16px;
      padding: 20px;
    }
    .support-qr {
      width: 140px;
      height: 140px;
    }
  }

  #app > * {
    animation: fadeUp 0.6s ease forwards;
  }

  @keyframes fadeUp {
    from {
      opacity: 0;
      transform: translateY(30px);
    }
    to {
      opacity: 1;
      transform: translateY(0);
    }
  }

  .toast {
    border-left: 4px solid var(--gold);
    border-radius: 12px;
    box-shadow: var(--shadow-hover);
  }
</style>
</head>
<body>
<a href="#main" class="skip-link">Skip to content</a>
<div id="app"></div>
<script defer src="app.js"></script>
</body>
</html>
