<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="google-site-verification" content="SYOHukSdD5r3CueZdTk2H9RJ5GdxMaoPBTS6CCC0150" />
<title>The One Journal — Daily News, World &amp; Tech</title>
<meta name="description" content="The One Journal delivers daily news and analysis across World affairs, Technology, and more — clear, timely, trustworthy reporting.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:ital,opsz,wght@0,8..60,400;0,8..60,600;0,8..60,700;0,8..60,900;1,8..60,400&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<style>
:root{
  --ink:#16243B;
  --ink-soft:#22335299;
  --cream:#F7F3EA;
  --cream-deep:#EFE9D8;
  --paper:#FFFDF8;
  --red:#C8102E;
  --red-deep:#9C0C22;
  --rule:#D8D2C2;
  --rule-strong:#B9B198;
  --slate:#5A6472;
  --ok:#1E6B4F;
  --focus:#1758C9;
  --serif:"Source Serif 4",Georgia,"Times New Roman",serif;
  --sans:"Inter",-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
  --mono:"JetBrains Mono",ui-monospace,Menlo,monospace;
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{
  background:var(--cream);
  color:var(--ink);
  font-family:var(--sans);
  -webkit-font-smoothing:antialiased;
  min-height:100vh;
}
img{max-width:100%;display:block;}
a{color:inherit;text-decoration:none;}
button{font-family:inherit;cursor:pointer;}
input,textarea,select{font-family:inherit;}
:focus-visible{outline:3px solid var(--focus);outline-offset:2px;}
::selection{background:var(--ink);color:var(--cream);}

.skip-link{position:absolute;left:-999px;top:0;background:var(--ink);color:var(--cream);padding:8px 14px;z-index:200;}
.skip-link:focus{left:8px;top:8px;}

/* ===== Masthead ===== */
.masthead-wrap{background:var(--paper);border-bottom:4px solid var(--ink);}
.masthead-top{
  max-width:1180px;margin:0 auto;padding:10px 20px 0;
  display:flex;justify-content:space-between;align-items:center;
  font-family:var(--mono);font-size:11px;letter-spacing:.06em;color:var(--slate);
  text-transform:uppercase;
}
.masthead-top .date-line{display:flex;gap:14px;align-items:center;}
.lock-btn{
  background:none;border:1px solid var(--rule-strong);border-radius:3px;
  padding:5px 9px;color:var(--slate);font-family:var(--mono);font-size:11px;
  display:flex;align-items:center;gap:6px;letter-spacing:.04em;
}
.lock-btn:hover{border-color:var(--ink);color:var(--ink);}
.lock-btn svg{width:12px;height:12px;}

.masthead{
  max-width:1180px;margin:0 auto;padding:6px 20px 22px;text-align:center;
}
.masthead h1{
  font-family:var(--serif);font-weight:900;letter-spacing:-.01em;
  font-size:clamp(40px,7vw,72px);margin:0;line-height:.95;
}
.masthead h1 .the{font-size:.32em;display:block;font-weight:600;letter-spacing:.32em;text-transform:uppercase;margin-bottom:6px;color:var(--slate);}
.masthead .tagline{
  font-family:var(--mono);font-size:11px;letter-spacing:.1em;text-transform:uppercase;
  color:var(--slate);margin-top:8px;
}

nav.main-nav{
  background:var(--ink);border-top:1px solid #0c1626;
}
.nav-inner{
  max-width:1180px;margin:0 auto;padding:0 20px;
  display:flex;gap:2px;overflow-x:auto;
}
.nav-inner a{
  font-family:var(--mono);font-size:12.5px;letter-spacing:.07em;text-transform:uppercase;
  color:#D9DEE8;padding:13px 16px;display:inline-block;border-bottom:3px solid transparent;
  white-space:nowrap;
}
.nav-inner a:hover{color:#fff;background:#1d2f4c;}
.nav-inner a.active{color:#fff;border-bottom-color:var(--red);}

/* ===== Ticker ===== */
.ticker-wrap{
  background:var(--red);color:#fff;display:flex;align-items:center;overflow:hidden;
  border-bottom:1px solid var(--red-deep);
}
.ticker-label{
  background:var(--red-deep);font-family:var(--mono);font-weight:700;font-size:11px;
  letter-spacing:.08em;padding:8px 14px;white-space:nowrap;flex-shrink:0;
}
.ticker-track-outer{overflow:hidden;flex:1;position:relative;}
.ticker-track{
  display:flex;white-space:nowrap;animation:ticker 32s linear infinite;
  padding:8px 0;will-change:transform;
}
.ticker-track:hover{animation-play-state:paused;}
.ticker-track span{font-size:13px;font-weight:500;padding:0 28px;border-right:1px solid #ffffff55;}
@keyframes ticker{from{transform:translateX(0);}to{transform:translateX(-50%);}}
@media (prefers-reduced-motion: reduce){.ticker-track{animation:none;overflow-x:auto;}}

/* ===== Layout shell ===== */
main{max-width:1180px;margin:0 auto;padding:34px 20px 60px;}
.page-title{
  font-family:var(--serif);font-weight:800;font-size:30px;border-bottom:3px solid var(--ink);
  padding-bottom:10px;margin:0 0 26px;
}

/* ===== Front page / lead ===== */
.lead-story{
  display:grid;grid-template-columns:1.15fr .85fr;gap:30px;
  border-bottom:1px solid var(--rule);padding-bottom:34px;margin-bottom:34px;
}
.lead-story.no-img{grid-template-columns:1fr;max-width:760px;}
.lead-story .lead-img{width:100%;aspect-ratio:16/10;object-fit:cover;background:var(--cream-deep);border:1px solid var(--rule);}
.lead-story .lead-img-cap{font-family:var(--mono);font-size:11px;color:var(--slate);margin-top:6px;}
.section-eyebrow{
  font-family:var(--mono);font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;
  color:var(--red);margin-bottom:8px;display:flex;gap:8px;align-items:center;
}
.tag-breaking{
  background:var(--red);color:#fff;font-family:var(--mono);font-size:10.5px;font-weight:700;
  letter-spacing:.07em;padding:3px 8px;text-transform:uppercase;
}
.lead-story h2{font-family:var(--serif);font-size:clamp(28px,4vw,42px);line-height:1.06;margin:0 0 12px;font-weight:800;}
.lead-story h2 a:hover{text-decoration:underline;}
.deck{font-family:var(--serif);font-size:17px;color:#2b3950;line-height:1.5;margin:0 0 14px;}
.byline-row{font-family:var(--mono);font-size:11.5px;color:var(--slate);letter-spacing:.02em;}
.byline-row b{color:var(--ink);font-weight:700;}

.story-list{display:flex;flex-direction:column;}
.story-row{
  display:grid;grid-template-columns:1fr 150px;gap:18px;
  padding:22px 0;border-bottom:1px solid var(--rule);
}
.story-row:first-child{padding-top:0;}
.story-row .thumb{width:150px;height:100px;object-fit:cover;background:var(--cream-deep);border:1px solid var(--rule);}
.story-row h3{font-family:var(--serif);font-size:21px;line-height:1.18;margin:0 0 8px;font-weight:700;}
.story-row .deck{font-size:14.5px;margin-bottom:8px;color:#3a4660;}
.story-row.no-img{grid-template-columns:1fr;}

.section-rail{display:grid;grid-template-columns:2fr 1fr;gap:36px;margin-top:10px;}
.rail{border-left:1px solid var(--rule);padding-left:24px;}
.rail h4{
  font-family:var(--mono);font-size:12px;letter-spacing:.08em;text-transform:uppercase;
  color:var(--ink);border-bottom:2px solid var(--ink);padding-bottom:8px;margin:0 0 14px;
}
.rail-item{padding:13px 0;border-bottom:1px solid var(--rule);}
.rail-item:first-child{padding-top:0;}
.rail-item a{font-family:var(--serif);font-size:16px;font-weight:600;line-height:1.3;}
.rail-item a:hover{text-decoration:underline;}
.rail-item .meta{font-family:var(--mono);font-size:10.5px;color:var(--slate);margin-top:5px;}

.empty-state{
  border:1px dashed var(--rule-strong);padding:50px 30px;text-align:center;color:var(--slate);
  font-family:var(--serif);font-size:17px;
}

/* ===== Article page ===== */
.article-back{
  display:inline-flex;align-items:center;gap:6px;font-family:var(--mono);font-size:12px;
  letter-spacing:.05em;text-transform:uppercase;color:var(--slate);margin-bottom:22px;
  border:1px solid var(--rule-strong);padding:7px 12px;
}
.article-back:hover{color:var(--ink);border-color:var(--ink);}
.article-head{max-width:760px;margin:0 auto 26px;text-align:left;}
.article-head h1{font-family:var(--serif);font-size:clamp(28px,5vw,46px);line-height:1.08;font-weight:800;margin:0 0 14px;}
.article-head .deck{font-size:19px;margin-bottom:16px;}
.article-meta{
  font-family:var(--mono);font-size:12px;color:var(--slate);display:flex;gap:16px;flex-wrap:wrap;
  border-top:1px solid var(--rule);border-bottom:1px solid var(--rule);padding:10px 0;
}
.article-figure{max-width:820px;margin:0 auto 30px;}
.article-figure img{width:100%;border:1px solid var(--rule);}
.article-figure figcaption{font-family:var(--mono);font-size:12px;color:var(--slate);margin-top:8px;}
.article-body{max-width:680px;margin:0 auto;font-family:var(--serif);font-size:19px;line-height:1.7;color:#1b2840;}
.article-body p{margin:0 0 22px;}
.article-body p:first-of-type::first-letter{
  font-size:3.4em;float:left;line-height:.85;padding-right:8px;padding-top:4px;font-weight:800;color:var(--ink);
}

/* ===== Footer ===== */
footer{background:var(--ink);color:#C9D1E0;margin-top:40px;}
.footer-inner{max-width:1180px;margin:0 auto;padding:38px 20px 26px;display:grid;grid-template-columns:1.4fr 1fr 1fr;gap:30px;}
.footer-inner h5{font-family:var(--mono);font-size:11px;letter-spacing:.09em;text-transform:uppercase;color:#8FA0C4;margin:0 0 12px;}
.footer-brand{font-family:var(--serif);font-size:22px;font-weight:800;color:#fff;margin-bottom:8px;}
.footer-inner p{font-size:13.5px;line-height:1.6;color:#A9B3C6;margin:0;}
.footer-links{display:flex;flex-direction:column;gap:9px;}
.footer-links a{font-size:13.5px;color:#C9D1E0;}
.footer-links a:hover{color:#fff;text-decoration:underline;}
.footer-bottom{
  border-top:1px solid #2A3C5C;padding:16px 20px;text-align:center;
  font-family:var(--mono);font-size:11px;color:#8194B5;letter-spacing:.03em;
}

/* ===== Static pages ===== */
.static-page{max-width:720px;margin:0 auto;}
.static-page h1{font-family:var(--serif);font-size:36px;font-weight:800;border-bottom:3px solid var(--ink);padding-bottom:12px;margin-bottom:8px;}
.static-page .updated{font-family:var(--mono);font-size:11.5px;color:var(--slate);margin-bottom:26px;display:block;}
.static-page h2{font-family:var(--serif);font-size:21px;margin:30px 0 10px;}
.static-page p,.static-page li{font-size:15.5px;line-height:1.7;color:#283450;}
.static-page ul{padding-left:22px;}
.placeholder-flag{
  background:#FFF5DD;border:1px solid #E5C875;color:#6B5519;
  font-size:12.5px;padding:8px 12px;margin:6px 0 16px;font-family:var(--mono);
}

/* team / contact specifics */
.contact-grid{display:grid;grid-template-columns:1fr 1fr;gap:34px;margin-top:20px;}
.contact-card{border:1px solid var(--rule);padding:20px;background:var(--paper);}
.contact-card h3{font-family:var(--mono);font-size:12px;text-transform:uppercase;letter-spacing:.08em;margin:0 0 12px;color:var(--slate);}
.contact-card .val{font-family:var(--serif);font-size:18px;font-weight:700;margin-bottom:4px;}
.contact-card a.val-link{color:var(--red);}
.form-field{margin-bottom:14px;}
.form-field label{display:block;font-family:var(--mono);font-size:11px;text-transform:uppercase;letter-spacing:.06em;color:var(--slate);margin-bottom:5px;}
.form-field input,.form-field textarea{
  width:100%;border:1px solid var(--rule-strong);background:var(--paper);padding:9px 11px;font-size:14.5px;color:var(--ink);
}
.form-field textarea{min-height:100px;resize:vertical;}
.btn{
  display:inline-flex;align-items:center;gap:7px;background:var(--ink);color:#fff;border:none;
  padding:11px 20px;font-family:var(--mono);font-size:12.5px;letter-spacing:.06em;text-transform:uppercase;
}
.btn:hover{background:#0c1932;}
.btn.red{background:var(--red);}
.btn.red:hover{background:var(--red-deep);}
.btn.ghost{background:transparent;color:var(--ink);border:1px solid var(--rule-strong);}
.btn.ghost:hover{border-color:var(--ink);}
.btn[disabled]{opacity:.5;cursor:not-allowed;}
.toast{
  position:fixed;bottom:22px;right:22px;background:var(--ink);color:#fff;padding:13px 18px;
  font-family:var(--mono);font-size:13px;letter-spacing:.02em;z-index:500;border-left:4px solid var(--red);
  box-shadow:0 8px 24px #0003;max-width:320px;
}

/* ===== Admin ===== */
.modal-overlay{
  position:fixed;inset:0;background:#0d1626d9;z-index:300;display:flex;align-items:center;justify-content:center;padding:20px;
}
.modal-box{background:var(--paper);max-width:380px;width:100%;padding:30px;border-top:5px solid var(--red);}
.modal-box h2{font-family:var(--serif);font-size:22px;margin:0 0 6px;}
.modal-box p{font-size:13.5px;color:var(--slate);margin:0 0 18px;}
.modal-box .form-field input{font-family:var(--mono);}
.modal-actions{display:flex;gap:10px;margin-top:18px;}
.modal-err{color:var(--red);font-size:13px;font-family:var(--mono);margin-top:8px;}

.admin-shell{max-width:1180px;}
.admin-bar{
  display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:14px;
  border-bottom:3px solid var(--ink);padding-bottom:14px;margin-bottom:26px;
}
.admin-bar h1{font-family:var(--serif);font-size:28px;margin:0;}
.admin-tabs{display:flex;gap:8px;margin-bottom:24px;flex-wrap:wrap;}
.admin-tabs button{
  background:transparent;border:1px solid var(--rule-strong);padding:9px 16px;font-family:var(--mono);
  font-size:12px;letter-spacing:.05em;text-transform:uppercase;color:var(--slate);
}
.admin-tabs button.active{background:var(--ink);color:#fff;border-color:var(--ink);}

.admin-grid{display:grid;grid-template-columns:1fr 1fr;gap:22px;}
fieldset{border:1px solid var(--rule);padding:18px;margin:0 0 18px;}
legend{font-family:var(--mono);font-size:11px;text-transform:uppercase;letter-spacing:.07em;color:var(--slate);padding:0 6px;}
.form-field select{width:100%;border:1px solid var(--rule-strong);background:var(--paper);padding:9px 11px;font-size:14.5px;}
.checkbox-row{display:flex;align-items:center;gap:8px;margin-bottom:12px;}
.checkbox-row input{width:16px;height:16px;}
.checkbox-row label{font-size:13.5px;color:var(--ink);}
.checkbox-row.breaking label{color:var(--red);font-weight:700;}
.file-drop{
  border:1.5px dashed var(--rule-strong);padding:18px;text-align:center;background:var(--cream-deep);
  font-size:13px;color:var(--slate);position:relative;cursor:pointer;
}
.file-drop input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer;}
.file-drop.has-file{border-color:var(--ok);background:#E9F4EE;color:var(--ok);}
.img-preview{max-height:160px;margin-top:12px;border:1px solid var(--rule);}
.htmljournal-box{background:#EEF3FA;border:1px solid #C5D4EA;padding:14px;margin-bottom:16px;}
.htmljournal-box p{font-size:12.5px;color:#324560;margin:0 0 10px;}

.article-table{width:100%;border-collapse:collapse;font-size:13.5px;}
.article-table th{
  text-align:left;font-family:var(--mono);font-size:10.5px;text-transform:uppercase;letter-spacing:.06em;
  color:var(--slate);border-bottom:2px solid var(--ink);padding:8px 10px;cursor:pointer;user-select:none;
}
.article-table th.sorted::after{content:" ▾";}
.article-table td{padding:10px 10px;border-bottom:1px solid var(--rule);vertical-align:middle;}
.article-table tr:hover td{background:#FBF8EF;}
.views-pill{
  font-family:var(--mono);font-weight:700;background:var(--ink);color:#fff;padding:3px 9px;border-radius:2px;font-size:12px;
}
.views-pill.top{background:var(--red);}
.row-actions{display:flex;gap:6px;}
.row-actions button{
  font-family:var(--mono);font-size:11px;border:1px solid var(--rule-strong);background:transparent;
  padding:5px 9px;letter-spacing:.03em;text-transform:uppercase;
}
.row-actions button:hover{border-color:var(--ink);}
.row-actions button.danger:hover{border-color:var(--red);color:var(--red);}
.confirm-row td{background:#FFF4F2!important;}
.confirm-inline{display:flex;gap:8px;align-items:center;font-size:12.5px;}

.badge-pill{font-family:var(--mono);font-size:10.5px;text-transform:uppercase;background:var(--cream-deep);padding:3px 8px;border:1px solid var(--rule);}
.badge-pill.featured{background:#1758C91A;color:#1758C9;border-color:#1758C955;}
.badge-pill.breaking{background:var(--red);color:#fff;border-color:var(--red);}

@media (max-width:860px){
  .lead-story{grid-template-columns:1fr;}
  .section-rail{grid-template-columns:1fr;}
  .rail{border-left:none;border-top:1px solid var(--rule);padding-left:0;padding-top:20px;}
  .footer-inner{grid-template-columns:1fr;gap:24px;}
  .contact-grid{grid-template-columns:1fr;}
  .admin-grid{grid-template-columns:1fr;}
  .story-row{grid-template-columns:1fr;}
  .story-row .thumb{width:100%;height:180px;order:-1;}
  .article-table{font-size:12px;}
  .article-table th:nth-child(3),.article-table td:nth-child(3){display:none;}
}
</style>
</head>
<body>
<a href="#main" class="skip-link">Skip to content</a>
<div id="app"></div>
<script src="app.js"></script>
</body>
